services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: employee_db
    ports:
      - "5432:5432"
    # CRITICAL: This saves your data even if you delete the container
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Senior Tip: Add a Healthcheck to ensure DB is actually ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d employee_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5 


  web:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/code  
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  

volumes:
  postgres_data: